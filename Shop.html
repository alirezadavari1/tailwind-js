    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
      }
      /* Optional: Add some hover effect for product cards */
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
      }
      .product-card {
        transition: all 0.2s ease-in-out;
      }
      /* Style for confirmation message */
      .add-to-cart-confirmation {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #2d372a;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
        display: none; /* Initially hidden */
      }
      .add-to-cart-confirmation.show {
        opacity: 1;
        display: block;
      }

      /* Style for cart item count badge */
      .cart-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background-color: #ef4444; /* Red color */
        color: white;
        border-radius: 50%;
        padding: 2px 6px;
        font-size: 0.75rem;
        font-weight: bold;
        display: none; /* Hidden by default */
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
      }
    </style>

          {

          },
          {

            price: 200000,

            description: 'فلش مموری ۱۶ گیگابایتی، ایده‌آل برای انتقال سریع و امن فایل‌های کوچک و متوسط. طراحی کم‌حجم و مقاوم.'

        ];

        // Function to format numbers as Iranian Toman (with commas)
        function formatToman(amount) {
          return new Intl.NumberFormat('fa-IR').format(amount);
        }

        // Initialize cart from Local Storage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Function to update the cart item count in the header
        function updateCartCount() {
          const totalItems = cart.reduce((total, item) => total + item.quantity, 0);
          cartItemCountSpan.textContent = totalItems;
          if (totalItems > 0) {
            cartItemCountSpan.style.display = 'flex'; // Show count if items exist
          } else {
            cartItemCountSpan.style.display = 'none'; // Hide count if no items
          }
        }

        // Function to add a product to the cart
        function addProductToCart(product) {
          const existingProductIndex = cart.findIndex(item => item.id === product.id);

          if (existingProductIndex > -1) {
            // Product already in cart, increment quantity
            cart[existingProductIndex].quantity += 1;
          } else {
            // Add new product to cart
            cart.push({ ...product, quantity: 1 });
          }
          localStorage.setItem('cart', JSON.stringify(cart));
          updateCartCount();
          showConfirmationMessage();
        }

        // Function to show confirmation message
        let confirmationTimeout;
        function showConfirmationMessage() {
          confirmationMessage.classList.add('show');
          clearTimeout(confirmationTimeout); // Clear any existing timeout
          confirmationTimeout = setTimeout(() => {
            confirmationMessage.classList.remove('show');
          }, 2000); // Hide after 2 seconds
        }

        // Function to render products dynamically
        function renderProducts() {
          productsGrid.innerHTML = ''; // Clear existing products
          products.forEach(product => {
            const productCard = `
              <div class="product-card block rounded-xl overflow-hidden bg-[#1d231e]">
                <div class="flex flex-col gap-3 pb-3">
                  <a href="product-detail.html?id=${product.id}">
                    <div
                      class="w-full bg-center bg-no-repeat aspect-square bg-cover rounded-xl"
                      style='background-image: url("${product.image}");'
                    ></div>
                  </a>
                  <div class="p-3">
                    <a href="product-detail.html?id=${product.id}">
                      <p class="text-white text-base font-medium leading-normal">${product.name}</p>
                      <p class="text-[#a5b6a0] text-sm font-normal leading-normal">${product.tagline}</p>
                    </a>
                    <p class="text-white text-md font-semibold mt-2">قیمت: ${formatToman(product.price)} تومان</p>
                    <button
                      class="add-to-cart-btn mt-4 w-full bg-[#3c4a38] text-white py-2 rounded-md text-sm font-semibold hover:bg-[#4a5a45] transition duration-200"
                      data-id="${product.id}"
                      data-name="${product.name}"
                      data-price="${product.price}"
                      data-image="${product.image}"
                    >
                      افزودن به سبد خرید
                    </button>
                  </div>
                </div>
              </div>
            `;
            productsGrid.insertAdjacentHTML('beforeend', productCard);
          });

          // Add event listeners to the new "Add to Cart" buttons
          document.querySelectorAll('.add-to-cart-btn').forEach(button => {
            button.addEventListener('click', (event) => {
              event.preventDefault(); // Prevent default if button was a link
              const product = {
                id: button.dataset.id,
                name: button.dataset.name,
                price: parseInt(button.dataset.price),
                image: button.dataset.image
              };
              addProductToCart(product);
            });
          });
        }

        // Initial render of products
        renderProducts();

        // Initial update of cart count when the page loads
        updateCartCount();
      });
    </script>
