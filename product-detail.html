      body {

      .add-to-cart-confirmation {
        position: fixed;

        right: 20px;
        background-color: #2d372a;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
        display: none;
      }
      .add-to-cart-confirmation.show {
        opacity: 1;
        display: block;
      }
      /* Custom styles for details/summary */
      details {
        background-color: #1d231e;
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px; /* Increased padding */
        color: white;
        font-weight: bold;
        cursor: pointer;
        outline: none;
        list-style: none; /* Hide default arrow */
        position: relative;
      }
      summary::-webkit-details-marker {
        display: none; /* Hide default arrow for Webkit browsers */
      }
      summary::after {
        content: '+';
        font-size: 1.5rem;
        transition: transform 0.2s ease-in-out;
        position: absolute;
        left: 20px; /* Adjust position for RTL */
      }
      details[open] summary::after {
        content: '-';
        transform: rotate(0deg);
      }
      .details-content {
        padding: 16px 20px 20px 20px; /* Increased padding */
        color: #e0e0e0;
        line-height: 1.8; /* Increased line height for readability */
        border-top: 1px solid #2d372a; /* Separator line */
      }
      .review-item {
        padding: 15px 0; /* Increased padding */
        border-bottom: 1px dashed #2d372a;
      }
      .review-item:last-child {
        border-bottom: none;
      }
      .star-rating {
        display: flex;
        gap: 2px;
      }
      .star-rating .fas {
        color: #ffc107; /* Gold color for filled stars */
      }
      .star-rating .far {
        color: #8c8c8c; /* Gray color for empty stars */
      }
      /* Style for star input radio buttons */
      .star-input {
        display: inline-flex;
        flex-direction: row-reverse; /* Reverse order for RTL stars */
      }
      .star-input input[type='radio'] {
        display: none;
      }
      .star-input label {
        cursor: pointer;
        font-size: 24px; /* Larger stars for input */
        color: #8c8c8c; /* Default empty star color */
        transition: color 0.2s;
        margin: 0 2px;
      }
      .star-input label:hover,
      .star-input label:hover ~ label {
        color: #ffc107; /* Hover color */
      }
      .star-input input[type='radio']:checked ~ label {
        color: #ffc107; /* Checked color */
      }

        // Function to format numbers as Iranian Toman (with commas)
        function formatToman(amount) {
          return new Intl.NumberFormat('fa-IR').format(amount);
        }

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // Find the product based on the ID
        const product = products.find(p => p.id === productId);

        // --- LocalStorage functions for reviews ---
        function getStoredReviews() {
          try {
            const stored = localStorage.getItem('userReviews');
            return stored ? JSON.parse(stored) : [];
          } catch (e) {
            console.error("Error parsing reviews from LocalStorage", e);
            return [];
          }
        }

        function saveReviews(reviews) {
          try {
            localStorage.setItem('userReviews', JSON.stringify(reviews));
          } catch (e) {
            console.error("Error saving reviews to LocalStorage", e);
          }
        }
        // --- End LocalStorage functions ---

        // This will now hold reviews loaded from LocalStorage, in addition to product's predefined reviews
        let allCurrentReviews = [];


        function renderReviews(currentProduct) {
          productReviewsContent.innerHTML = ''; // Clear previous reviews

          // Get reviews specifically for this product from LocalStorage
          const storedReviewsForThisProduct = getStoredReviews().filter(r => r.productId === currentProduct.id);

          // Combine predefined reviews with stored user reviews
          const reviewsToDisplay = [...currentProduct.reviews, ...storedReviewsForThisProduct];

          if (reviewsToDisplay.length > 0) {
            noReviewsMessage.classList.add('hidden');
            
            // Shuffle all reviews and pick up to 3 random ones (plus any new user reviews)
            const shuffledReviews = [...reviewsToDisplay].sort(() => 0.5 - Math.random());
            const numberOfReviewsToShow = Math.min(3, shuffledReviews.length); // Show up to 3 random reviews
            const reviewsToShow = shuffledReviews.slice(0, numberOfReviewsToShow);
            
            // Ensure newly added review by current user is always shown if exists in storedReviewsForThisProduct
            // This logic makes sure the very last review added by the user is likely to appear,
            // even if random selection excludes some other reviews.
            if (storedReviewsForThisProduct.length > 0) {
                const lastUserReview = storedReviewsForThisProduct[storedReviewsForThisProduct.length - 1];
                if (!reviewsToShow.includes(lastUserReview)) {
                    // Replace one of the randomly selected reviews with the last user review if not already present
                    if (reviewsToShow.length < 3) { // If less than 3, just add it
                        reviewsToShow.push(lastUserReview);
                    } else { // If 3, replace a random one
                        reviewsToShow[Math.floor(Math.random() * 3)] = lastUserReview;
                    }
                }
            }


            reviewsToShow.forEach(review => {
              const reviewHtml = `
                <div class="review-item mb-4">
                  <div class="flex items-center gap-2 mb-1">
                    <p class="font-bold text-white">${review.user}</p>
                    ${generateStarRating(review.rating)}
                  </div>
                  <p class="text-gray-300 text-sm">${review.comment}</p>
                </div>
              `;
              productReviewsContent.insertAdjacentHTML('beforeend', reviewHtml);
            });
          } else {
            noReviewsMessage.classList.remove('hidden');
          }
        }


        if (product) {
          // Populate product details
          pageTitle.textContent = `${product.name} | NovaTech`;
          productImage.src = product.image;
          productImage.alt = product.name;
          productName.textContent = product.name;
          productTagline.textContent = product.tagline;
          productPriceDisplay.textContent = formatToman(product.price);
          productFullDescription.textContent = product.description; // Set full description

          // Set data attributes for the Add to Cart button
          addToCartButton.dataset.id = product.id;
          addToCartButton.dataset.name = product.name;
          addToCartButton.dataset.price = product.price;
          addToCartButton.dataset.image = product.image;

          // Render reviews
          renderReviews(product);


          // Show product detail and hide not found message
          productDetailContainer.classList.remove('hidden');
          productAdditionalInfo.classList.remove('hidden'); // Show additional info section
          productNotFoundMessage.classList.add('hidden');
        } else {
          // Product not found
          productDetailContainer.classList.add('hidden');
          productAdditionalInfo.classList.add('hidden'); // Hide additional info if product not found
          productNotFoundMessage.classList.remove('hidden');
          pageTitle.textContent = 'محصول یافت نشد | NovaTech';
        }

        // Handle review form submission
        reviewForm.addEventListener('submit', (event) => {
          event.preventDefault(); // Prevent default form submission

          const userName = document.getElementById('review-user-name').value;
          const userRating = document.querySelector('input[name="review-rating"]:checked');
          const userComment = document.getElementById('review-comment').value;

          if (!userName || !userRating || !userComment) {
            alert('لطفاً تمام فیلدها را پر کنید و امتیاز دهید.');
            return;
          }

          const newReview = {
            user: userName,
            rating: parseInt(userRating.value),
            comment: userComment,
            productId: product.id // Associate review with the current product
          };

          // Add to LocalStorage
          const allStoredReviews = getStoredReviews();
          allStoredReviews.push(newReview);
          saveReviews(allStoredReviews);

          renderReviews(product); // Re-render reviews to include the new one from LocalStorage

          // Show confirmation message
          reviewConfirmationMessage.classList.remove('hidden');
          setTimeout(() => {
            reviewConfirmationMessage.classList.add('hidden');
          }, 3000);

          // Reset form fields
          reviewForm.reset();
          // Uncheck star ratings
          document.querySelectorAll('input[name="review-rating"]').forEach(radio => radio.checked = false);
        });


        // Initialize cart from Local Storage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Function to update the cart item count in the header
        function updateCartCount() {
          cartItemCountSpan.textContent = cart.reduce((total, item) => total + item.quantity, 0);
          if (cart.length > 0) {
            cartItemCountSpan.style.display = 'flex';
          } else {
            cartItemCountSpan.style.display = 'none';
          }
        }

        // Function to add a product to the cart
        function addProductToCart(productToAdd) {
          const existingProductIndex = cart.findIndex(item => item.id === productToAdd.id);

          if (existingProductIndex > -1) {
            cart[existingProductIndex].quantity += 1;
          } else {
            cart.push({ ...productToAdd, quantity: 1 });
          }
          localStorage.setItem('cart', JSON.stringify(cart));
          updateCartCount();
          showConfirmationMessage();
        }

        // Function to show confirmation message for Add to Cart
        let confirmationTimeout;
        function showConfirmationMessage() {
          confirmationMessage.classList.add('show');
          clearTimeout(confirmationTimeout);
          confirmationTimeout = setTimeout(() => {
            confirmationMessage.classList.remove('show');
          }, 2000);
        }

        // Add event listener to the "Add to Cart" button
        if (addToCartButton) {
          addToCartButton.addEventListener('click', (event) => {
            event.preventDefault();
            const productData = {
              id: addToCartButton.dataset.id,
              name: addToCartButton.dataset.name,
              price: parseInt(addToCartButton.dataset.price),
              image: addToCartButton.dataset.image
            };
            // Only add to cart if a valid product was found and its ID is not empty
            if (productData.id) {
                addProductToCart(productData);
            }
          });
        }

        // Initial update of cart count when the page loads
        updateCartCount();
      });
    </script>
