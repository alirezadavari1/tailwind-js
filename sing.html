<html dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaTech</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
      }
      /* Custom style for invalid fields */
      .invalid-field {
        border-color: #ef4444 !important; /* Tailwind's red-500 */
      }
      /* Remove number input arrows */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
      }
    </style>
  </head>

  <body class="bg-[#131712] min-h-screen flex flex-col overflow-x-hidden">
    <div class="layout-container flex flex-col flex-grow h-full">
      <header class="flex items-center justify-between border-b border-b-[#2d372a] px-6 sm:px-10 py-4" dir="ltr">
        <div class="flex items-center gap-4 text-white">
          <div class="size-4"></div>
          <a class="text-white text-lg font-bold tracking-[-0.015em]" href="Home.html">NovaTech</a>
        </div>

        <div class="flex flex-1 justify-end items-center gap-4 sm:gap-8 flex-wrap">
          <div class="flex items-center gap-4 sm:gap-9">
            <a class="text-white text-sm font-medium transition duration-200 hover:scale-105 hover:text-white/90" href="Contactus.html">تماس با ما</a>
            <a class="text-white text-sm font-medium transition duration-200 hover:scale-105 hover:text-white/90" href="Address.html">آدرس ما</a>
            <a class="text-white text-sm font-medium transition duration-200 hover:scale-105 hover:text-white/90" href="alireza/index.html">وبلاگ من</a>
            <a class="text-white text-sm font-medium transition duration-200 hover:scale-105 hover:text-white/90" href="Nazar.html">درباره ما</a>
            <a class="text-white text-sm font-medium transition duration-200 hover:scale-105 hover:text-white/90" href="Shop.html">فروشگاه</a>

          </div>

          <div class="flex items-center gap-2 mt-2 sm:mt-0">
            <a href="sing.html" class="flex items-center justify-center rounded-full bg-[#2d372a] text-white text-sm font-bold h-10 px-4 transition duration-200 hover:text-white/80">
              <span class="truncate">ثبت نام</span>
            </a>

            <button class="flex items-center justify-center rounded-full h-10 px-2.5 bg-[#2d372a] text-white transition transform duration-200 hover:scale-105 hover:text-white/80">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
                <path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z" />
              </svg>
            </button>

            <a href="sabad.html">
              <button class="flex items-center justify-center rounded-full h-10 px-2.5 bg-[#2d372a] text-white transition transform duration-200 hover:scale-105 hover:text-white/80">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
                  <path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,160H40V56H216V200ZM176,88a48,48,0,0,1-96,0,8,8,0,0,1,16,0,32,32,0,0,0,64,0,8,8,0,0,1,16,0Z" />
                </svg>
              </button>
            </a>
          </div>
        </div>
      </header>

      <div class="px-4 sm:px-10 py-5 flex flex-1 justify-center relative"> 
        <div id="registration-form-container" class="layout-content-container flex flex-col w-full max-w-[600px] py-5 flex-1 bg-[#1b3124] rounded-xl shadow-lg p-6">
          <h2 class="text-white tracking-light text-[28px] font-bold leading-tight px-4 pb-3 pt-5">ثبت نام</h2>
          
          <div class="flex flex-col gap-3 p-4">
            <div class="flex gap-6 justify-between">
              <p id="progress-text" class="text-white text-base font-medium leading-normal">مرحله 1</p>
            </div>
            <div class="rounded bg-[#42513e]">
              <div id="progress-bar" class="h-2 rounded bg-white transition-all duration-300" style="width: 33%;"></div>
            </div>
          </div>

          <div id="form-fields-container">
            <div id="stage-1-fields">
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">نام</p>
                  <input
                    id="name"
                    type="text"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">ایمیل</p>
                  <input
                    id="email"
                    type="email"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">شماره تماس</p>
                  <input
                    id="phone"
                    type="tel"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                    pattern="[0-9]{11}"
                    title="شماره تماس باید ۱۱ رقم عددی باشد."
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">شهر</p>
                  <input
                    id="city"
                    type="text"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">استان</p>
                  <input
                    id="province"
                    type="text"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">آدرس خانه</p>
                  <input
                    id="address"
                    type="text"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">کد پستی</p>
                  <input
                    id="postal-code"
                    type="text"
                    inputmode="numeric"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                    pattern="[0-9]*"
                    title="کد پستی باید فقط شامل اعداد باشد."
                  />
                </label>
              </div>
            </div>

            <div id="stage-2-fields" class="hidden">
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">شماره شناسنامه (کد ملی)</p>
                  <input
                    id="id-number"
                    type="text"
                    inputmode="numeric"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                    pattern="[0-9]{10}"
                    title="شماره شناسنامه (کد ملی) باید ۱۰ رقم عددی باشد."
                    maxlength="10"
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">شماره تلفن همراه</p>
                  <input
                    id="mobile-phone"
                    type="tel"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                    pattern="[0-9]{11}"
                    title="شماره تلفن همراه باید ۱۱ رقم عددی باشد."
                  />
                </label>
              </div>
            </div>

            <div id="stage-3-fields" class="hidden">
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">پسورد</p>
                  <input
                    id="password"
                    type="password"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-white text-base font-medium leading-normal pb-2">تکرار پسورد</p>
                  <input
                    id="confirm-password"
                    type="password"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-transparent bg-[#2d372a] focus:border-[#39e079] h-14 placeholder:text-[#a5b6a0] p-4 text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
            </div>
          </div>

          <div class="flex justify-between items-center gap-4 px-4 py-3 mt-6">
            <button
              id="prev-step-btn"
              class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-[#2d372a] text-white text-sm font-bold leading-normal tracking-[0.015em] transition duration-200 hover:bg-[#42513e] disabled:opacity-50 disabled:cursor-not-allowed"
              disabled
            >
              <span class="truncate">مرحله قبل</span>
            </button>
            <button
              id="next-step-btn"
              class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 flex-1 bg-[#53d22c] text-[#131712] text-sm font-bold leading-normal tracking-[0.015em] transition duration-200 hover:bg-[#2fa860]"
            >
              <span class="truncate">مرحله بعد</span>
            </button>
          </div>
        </div>

        <div id="success-message-container" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
            <div class="bg-[#1b3124] rounded-xl shadow-lg p-8 text-center border border-[#39e079]">
                <p class="text-white text-2xl font-bold mb-4">شما ثبت نام شدید!</p>
                <p class="text-[#96c5a8]">در حال انتقال به صفحه اصلی...</p>
            </div>
        </div>

      </div>
    </div>

    <script>
 
  let currentStage = 1;
  const totalStages = 3;

  const registrationFormContainer = document.getElementById('registration-form-container');
  const successMessageContainer = document.getElementById('success-message-container');
  const progressBar = document.getElementById('progress-bar');
  const progressText = document.getElementById('progress-text');
  const nextStepBtn = document.getElementById('next-step-btn');
  const prevStepBtn = document.getElementById('prev-step-btn');
  const stage1Fields = document.getElementById('stage-1-fields');
  const stage2Fields = document.getElementById('stage-2-fields');
  const stage3Fields = document.getElementById('stage-3-fields');

  function validateStage(stage) {
    let fieldsToValidate = [];
    if (stage === 1) {
      fieldsToValidate = stage1Fields.querySelectorAll('input[required]');
    } else if (stage === 2) {
      fieldsToValidate = stage2Fields.querySelectorAll('input[required]');
    } else if (stage === 3) {
      fieldsToValidate = stage3Fields.querySelectorAll('input[required]');
    }

    let allFieldsValid = true;
    fieldsToValidate.forEach(field => {
      field.classList.remove('invalid-field');
      if (field.value.trim() === '') {
        field.classList.add('invalid-field');
        allFieldsValid = false;
      } else {
        if (field.id === 'phone' || field.id === 'mobile-phone') {
          if (!/^\d{11}$/.test(field.value.trim())) {
            field.classList.add('invalid-field');
            allFieldsValid = false;
          }
        } else if (field.id === 'postal-code') {
          if (!/^\d+$/.test(field.value.trim())) {
            field.classList.add('invalid-field');
            allFieldsValid = false;
          }
        } else if (field.id === 'id-number') {
          if (!/^\d{10}$/.test(field.value.trim())) {
            field.classList.add('invalid-field');
            allFieldsValid = false;
          }
        }
      }
    });

    if (stage === 3) {
      const password = document.getElementById('password');
      const confirmPassword = document.getElementById('confirm-password');

      password.classList.remove('invalid-field');
      confirmPassword.classList.remove('invalid-field');

      if (password.value.trim() !== confirmPassword.value.trim()) {
        password.classList.add('invalid-field');
        confirmPassword.classList.add('invalid-field');
        allFieldsValid = false;
        alert('رمز عبور و تکرار آن یکسان نیستند.');
      }
    }

    return allFieldsValid;
  }

  function updateStageDisplay() {
    progressText.textContent = `مرحله ${currentStage}`;
    progressBar.style.width = `${(currentStage / totalStages) * 100}%`;

    stage1Fields.classList.add('hidden');
    stage2Fields.classList.add('hidden');
    stage3Fields.classList.add('hidden');

    if (currentStage === 1) {
      stage1Fields.classList.remove('hidden');
    } else if (currentStage === 2) {
      stage2Fields.classList.remove('hidden');
    } else if (currentStage === 3) {
      stage3Fields.classList.remove('hidden');
    }

    prevStepBtn.disabled = currentStage === 1;
    nextStepBtn.textContent = currentStage === totalStages ? 'ثبت نهایی' : 'مرحله بعد';
  }

  nextStepBtn.addEventListener('click', () => {
    if (!validateStage(currentStage)) return;

    if (currentStage < totalStages) {
      currentStage++;
      updateStageDisplay();
    } else {
      // ثبت نهایی
      registrationFormContainer.classList.add('hidden');
      successMessageContainer.classList.remove('hidden');

      // رفتن به صفحه خانه بعد از ۳ ثانیه
      setTimeout(() => {
        window.location.href = 'Home.html';
      }, 3000);
    }
  });

  prevStepBtn.addEventListener('click', () => {
    if (currentStage > 1) {
      currentStage--;
      updateStageDisplay();
    }
  });

  // در شروع صفحه
  updateStageDisplay();


    </script>
  </body>
</html>
